<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KombatFighters</title>
    <script>
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            // Si on est en local sur ton PC
            document.write('<base href="/" />');
        } else {
            // Si on est sur Internet (GitHub Pages)
            document.write('<base href="/KombatFighters/" />');
        }
    </script>
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="KombatFighters.styles.css" rel="stylesheet" />
    <script>
        window.telechargerFichier = (nomFichier, base64) => {
            const link = document.createElement('a');
            link.download = nomFichier;
            link.href = "data:application/pdf;base64," + base64;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
